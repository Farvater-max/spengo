<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="description" content="SpenGo — personal expense tracker powered by Google Sheets. No servers, no ads. Track your spending by day, week or month with instant visual analytics.">
    <meta property="og:type"        content="website">
    <meta property="og:url"         content="https://webspengo.xyz/">
    <meta property="og:title" content="SpenGo — Free Expense Tracker Powered by Google Sheets">
    <meta property="og:description" content="Personal expense tracker. No servers, no ads. Track spending by day, week or month.">
    <meta property="og:image"       content="https://webspengo.xyz/ogimage.png">
    <meta name="twitter:card"        content="summary_large_image">
    <meta name="twitter:title" content="SpenGo — Free Expense Tracker Powered by Google Sheets">
    <meta name="twitter:description" content="Personal expense tracker. No servers, no ads.">
    <meta name="twitter:image"       content="https://webspengo.xyz/ogimage.png">
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin-allow-popups">
    <meta http-equiv="Cross-Origin-Embedder-Policy" content="unsafe-none">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <meta name="google-site-verification" content="8m2v9Wd6siFG5paHih95X9_f-0RKiWY--jQi_u4_vlc" />
    <title>SpenGo — Free Expense Tracker Powered by Google Sheets</title>
    <link rel="canonical" href="https://webspengo.xyz/" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="src/styles.css"/>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "WebApplication",
            "name": "SpenGo",
            "url": "https://webspengo.xyz/",
            "description": "Personal expense tracker powered by Google Sheets. No servers, no ads, no data sharing. Track spending by day, week or month with visual analytics.",
            "applicationCategory": "FinanceApplication",
            "operatingSystem": "Web, iOS, Android",
            "browserRequirements": "Requires JavaScript. Requires Google account.",
            "offers": {
                "@type": "Offer",
                "price": "0"
            },
            "featureList": [
                "Google Sheets as database",
                "No server-side data storage",
                "No ads",
                "Offline support",
                "Multilingual: English, Russian, Spanish, Polish, Czech",
                "Visual analytics by category",
                "Day, week, month tracking periods",
                "Share with a partner"
            ],
            "screenshot": "https://webspengo.xyz/ogimage.png",
            "inLanguage": ["en", "ru", "es", "pl", "cs"],
            "privacyPolicy": "https://webspengo.xyz/privacy-policy/"
        }
</script>
</head>
<body>

<div class="toast" id="toast"></div>
<div id="app">

    <!-- React: AuthScreen -->
    <div id="screen-auth-root" style="display:none; flex:1; min-height:0;"></div>

    <!-- React: SetupScreen -->
    <div id="screen-setup-root" style="display:none"></div>

    <div id="screen-main" class="screen">
        <!-- React: MainHeader -->
        <div id="main-header-root"></div>

        <!-- React: SummaryCard -->
        <div id="summary-card-root"></div>

        <!-- React: CategoryFilter -->
        <div id="cat-filter-row"></div>

        <!-- React: SectionHeader (title + sort controls) -->
        <div id="section-header-root"></div>

        <!-- React: ExpenseList -->
        <div id="expense-list" class="expense-list"></div>
    </div>

    <div id="screen-stats" class="screen">
        <!-- React: StatsHeader -->
        <div id="stats-header-root"></div>

        <!-- React: StatsScreen (mounted once) -->
        <div id="stats-screen-root"></div>
    </div>
</div>

<!-- React: BottomNav -->
<div id="bottom-nav-root" style="display:none"></div>

<!-- React modals -->
<div id="modal-profile-root"></div>
<div id="modal-add-root"></div>
<div id="modal-edit-root"></div>
<div id="modal-share-root"></div>
<div id="modal-feedback-root"></div>

<!-- React popover -->
<div id="onboarding-popover-root"></div>
<script type="module" src="src/app.js"></script>
</body>
</html>
